name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan secrets
        run: |
          LEAKS=$(grep -rn -E '(api[_-]?key|token|secret|password)\s*[:=]\s*["'"'"'][A-Za-z0-9+/=_-]{20,}' \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.yml" \
            --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".venv" \
            --exclude=".env.example" --exclude="pyproject.toml" . || true)
          if [ -n "$LEAKS" ]; then
            echo "::error::Secrets potentiels detectes"
            echo "$LEAKS"
            exit 1
          fi
          echo "Aucun secret detecte"

      - name: Check no private references
        run: |
          PRIV=$(grep -rn 'MPtoO-V2\|hamidedefr/MPtoO\|mptoo-v2\|moltbot-secure' \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.md" \
            --exclude-dir=".git" --exclude-dir="node_modules" . || true)
          if [ -n "$PRIV" ]; then
            echo "::warning::References au repo prive detectees"
            echo "$PRIV"
          fi

      - name: Check mandatory files
        run: |
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md; do
            [ -f "$f" ] || { echo "::error::$f manquant"; exit 1; }
          done

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: security

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tawiza
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: tawiza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tawiza:test_password@localhost:5432/tawiza_test
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: .
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --no-header -q \
            --continue-on-collection-errors 2>&1 | tee pytest-output.txt
          SUMMARY=$(tail -1 pytest-output.txt)
          if echo "$SUMMARY" | grep -qP '\d+ failed'; then
            echo "::error::Tests failed"
            exit 1
          fi

      - name: Coverage summary
        if: always()
        run: |
          if [ -f pytest-output.txt ]; then
            echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
            tail -5 pytest-output.txt >> "$GITHUB_STEP_SUMMARY"
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tawiza:latest .
