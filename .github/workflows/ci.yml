name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  security:
    name: Securite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan secrets
        run: |
          LEAKS=$(grep -rn -E '(api[_-]?key|token|secret|password)\s*[:=]\s*["'"'"'][A-Za-z0-9+/=_-]{20,}' \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.yml" \
            --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".venv" \
            --exclude=".env.example" --exclude="pyproject.toml" --exclude="*.lock" . || true)
          if [ -n "$LEAKS" ]; then
            echo "::error::Secrets potentiels detectes"
            echo "$LEAKS"
            exit 1
          fi

      - name: Scan fichiers sensibles
        run: |
          SENSITIVE=$(find . -not -path "./.git/*" -not -path "./node_modules/*" \
            \( -name "*.env" -not -name ".env.example" -not -name ".env.local.example" \) \
            -o -name "*.secret" -o -name "*.key" -o -name "*.pem" -o -name "id_rsa*" 2>/dev/null)
          if [ -n "$SENSITIVE" ]; then
            echo "::error::Fichiers sensibles dans le repo"
            echo "$SENSITIVE"
            exit 1
          fi

      - name: Check references privees
        env:
          PATTERNS: ${{ secrets.PRIVATE_REPO_PATTERNS }}
        run: |
          if [ -z "$PATTERNS" ]; then
            echo "::notice::PRIVATE_REPO_PATTERNS secret not set, skipping"
            exit 0
          fi
          PRIV=$(grep -rn "$PATTERNS" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.md" \
            --exclude-dir=".git" --exclude-dir="node_modules" . || true)
          if [ -n "$PRIV" ]; then
            echo "::warning::References au repo prive detectees"
            echo "$PRIV"
          fi

      - name: Check fichiers obligatoires
        run: |
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md ROADMAP.md CHANGELOG.md; do
            [ -f "$f" ] || { echo "::error::$f manquant"; exit 1; }
          done

  autofix:
    name: Auto-fix
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Fix em dashes et smart quotes
        run: |
          find . -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./.venv/*" \
            \( -name "*.md" -o -name "*.py" \) \
            -exec sed -i 's/\xe2\x80\x94/ - /g; s/\xe2\x80\x93/-/g' {} +
          find . -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./.venv/*" \
            \( -name "*.md" -o -name "*.py" \) \
            -exec sed -i "s/\xe2\x80\x9c/\"/g; s/\xe2\x80\x9d/\"/g; s/\xe2\x80\x98/'/g; s/\xe2\x80\x99/'/g" {} +

      - name: Fix trailing whitespace
        run: |
          find . -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./.venv/*" \
            \( -name "*.md" -o -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.json" \) \
            -exec sed -i 's/[[:space:]]*$//' {} +

      - name: Fix JSON formatting
        run: |
          sudo apt-get install -y -qq jq > /dev/null 2>&1
          find . -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./.venv/*" \
            -not -path "./frontend/bun.lock" -name "*.json" | while read f; do
            if jq . "$f" > /dev/null 2>&1; then
              jq --indent 2 '.' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
            fi
          done

      - name: Commit fixes
        run: |
          git config user.name "hamidedefr"
          git config user.email "tawiza.v0@gmail.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto-fix: nettoyage typographique"
            git push
          fi

  humanize:
    name: Check humanisation
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Score AI
        run: |
          SCORE=0

          EM=$(find . -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./.venv/*" \
            -name "*.md" -exec grep -c $'\xe2\x80\x94' {} + 2>/dev/null \
            | awk -F: '{s+=$2}END{print s+0}')
          if [ "$EM" -gt 0 ]; then
            echo "::warning::$EM em dashes (corriges par auto-fix)"
            SCORE=$((SCORE+EM))
          fi

          AI=$(grep -rci -E 'comprehensive|seamless|leverage|cutting-edge|state-of-the-art|delve into' \
            --include="*.md" --exclude-dir=".git" . 2>/dev/null \
            | awk -F: '{s+=$2}END{print s+0}')
          if [ "$AI" -gt 0 ]; then
            echo "::warning::$AI occurrences de vocabulaire AI"
            SCORE=$((SCORE+AI*2))
          fi

          echo "Score AI : $SCORE (0 = propre, >50 = a nettoyer)"
          if [ "$SCORE" -gt 50 ]; then
            echo "::error::Score AI trop eleve ($SCORE)"
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: security

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tawiza
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: tawiza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tawiza:test_password@localhost:5432/tawiza_test
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: .
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --no-header -q \
            --continue-on-collection-errors 2>&1 | tee pytest-output.txt
          SUMMARY=$(tail -1 pytest-output.txt)
          if echo "$SUMMARY" | grep -qP '\d+ failed'; then
            echo "::error::Tests failed"
            exit 1
          fi

      - name: Coverage summary
        if: always()
        run: |
          if [ -f pytest-output.txt ]; then
            echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
            tail -5 pytest-output.txt >> "$GITHUB_STEP_SUMMARY"
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, humanize]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tawiza:latest .
