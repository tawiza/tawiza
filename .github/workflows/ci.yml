name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tawiza
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: tawiza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tawiza:test_password@localhost:5432/tawiza_test
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Run with --continue-on-collection-errors to handle optional deps
          pytest tests/unit -v --cov=src --cov-report=xml --no-header -q \
            --continue-on-collection-errors 2>&1 | tee pytest-output.txt
          # Extract the summary line and fail only on actual test failures
          SUMMARY=$(tail -1 pytest-output.txt)
          if echo "$SUMMARY" | grep -qP '\d+ failed'; then
            echo "::error::$SUMMARY"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: ./coverage.xml
          flags: unittests

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx next lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, frontend-lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tawiza:latest .
