<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Tawiza Eye — article signature -->
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <!-- Eye outline -->
  <path d="M 20,60 Q 100,10 180,60 Q 100,110 20,60 Z"
        fill="none" stroke="#b45309" stroke-width="2.5" opacity="0.8"/>
  <!-- Iris -->
  <circle cx="100" cy="60" r="28" fill="url(#iris)" opacity="0.9"/>
  <!-- Pupil -->
  <circle cx="100" cy="60" r="12" fill="#1c1917"/>
  <!-- Light reflection -->
  <circle cx="108" cy="52" r="5" fill="#fafaf9" opacity="0.6"/>
  <!-- Eyelid hint -->
  <path d="M 30,60 Q 100,20 170,60"
        fill="none" stroke="#78716c" stroke-width="1" opacity="0.4"/>
  <!-- Text -->
  <text x="100" y="118" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="11" fill="#78716c"
        letter-spacing="2">TAWIZA</text>
</svg>
