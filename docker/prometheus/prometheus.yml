global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'tawiza-monitor'

scrape_configs:
  # Tawiza API metrics
  - job_name: 'tawiza-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
