<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TAJINE Logo v2 - Geometric Minimalist -->

  <!-- Cone/lid - geometric triangle with rounded corners -->
  <path
    d="M24 8L36 30H12L24 8Z"
    fill="url(#cone-gradient)"
    stroke="#88C0D0"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Circuit lines on cone (tech accent) -->
  <line x1="24" y1="14" x2="24" y2="22" stroke="#8FBCBB" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="22" x2="28" y2="22" stroke="#8FBCBB" stroke-width="1" opacity="0.4"/>

  <!-- Data points (3 dots aligned) -->
  <circle cx="24" cy="16" r="1.5" fill="#88C0D0"/>
  <circle cx="24" cy="20" r="1" fill="#81A1C1" opacity="0.8"/>
  <circle cx="24" cy="24" r="1" fill="#81A1C1" opacity="0.6"/>

  <!-- Base/plate - simplified ellipse -->
  <ellipse
    cx="24"
    cy="34"
    rx="14"
    ry="5"
    fill="#3B4252"
    stroke="#88C0D0"
    stroke-width="1.5"
  />

  <!-- Steam wisps - will be animated via CSS -->
  <g class="steam-group">
    <path
      class="steam steam-1"
      d="M20 6C20 6 19 3 20 1"
      stroke="#8FBCBB"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.5"
    />
    <path
      class="steam steam-2"
      d="M24 5C24 5 24 2 25 0"
      stroke="#88C0D0"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.7"
    />
    <path
      class="steam steam-3"
      d="M28 6C28 6 29 3 28 1"
      stroke="#8FBCBB"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.5"
    />
  </g>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="cone-gradient" x1="24" y1="8" x2="24" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4C566A"/>
      <stop offset="100%" stop-color="#2E3440"/>
    </linearGradient>
  </defs>

  <!-- CSS Animations embedded -->
  <style>
    .steam {
      animation: steam-rise 2s ease-in-out infinite;
    }
    .steam-1 { animation-delay: 0s; }
    .steam-2 { animation-delay: 0.3s; }
    .steam-3 { animation-delay: 0.6s; }

    @keyframes steam-rise {
      0% {
        transform: translateY(0);
        opacity: 0.5;
      }
      50% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-6px);
        opacity: 0;
      }
    }
  </style>
</svg>
