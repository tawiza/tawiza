<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TAJINE logo - stylized cone shape representing the Moroccan tajine pot -->
  <!-- Uses Nord theme colors -->

  <!-- Cone/lid shape -->
  <path
    d="M24 6L38 32H10L24 6Z"
    fill="url(#gradient-cone)"
    stroke="#88C0D0"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Base/plate -->
  <ellipse
    cx="24"
    cy="36"
    rx="16"
    ry="6"
    fill="#3B4252"
    stroke="#88C0D0"
    stroke-width="1.5"
  />

  <!-- Steam wisps -->
  <path
    d="M20 8C20 8 18 4 20 2"
    stroke="#8FBCBB"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
  />
  <path
    d="M24 6C24 6 24 2 26 0"
    stroke="#88C0D0"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.8"
  />
  <path
    d="M28 8C28 8 30 4 28 2"
    stroke="#8FBCBB"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- Decorative dots on cone -->
  <circle cx="24" cy="18" r="1.5" fill="#A3BE8C" opacity="0.8"/>
  <circle cx="20" cy="24" r="1" fill="#EBCB8B" opacity="0.7"/>
  <circle cx="28" cy="24" r="1" fill="#EBCB8B" opacity="0.7"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient-cone" x1="24" y1="6" x2="24" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4C566A"/>
      <stop offset="100%" stop-color="#2E3440"/>
    </linearGradient>
  </defs>
</svg>
