[pytest]
# Pytest configuration for Tawiza

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 8.0

# Test paths
testpaths = tests

# CLI options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-branch
    # Show warnings
    -W default
    # Fail on first error (comment out for CI)
    # -x

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    e2e: End-to-end tests (full system tests)
    performance: Performance and load tests
    security: Security and vulnerability tests
    slow: Slow running tests
    minio: Tests requiring MinIO service
    ollama: Tests requiring Ollama service
    mlflow: Tests requiring MLflow service
    labelstudio: Tests requiring Label Studio service
    postgres: Tests requiring PostgreSQL database
    redis: Tests requiring Redis cache
    gpu: Tests requiring GPU access
    network: Tests requiring network access

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    venv
    htmlcov
    .pytest_cache
    __pycache__
    frontend
    output

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (optional - requires pytest-timeout)
timeout = 30
timeout_method = thread

# Fail on warnings (strict mode - comment out during development)
# filterwarnings = error
